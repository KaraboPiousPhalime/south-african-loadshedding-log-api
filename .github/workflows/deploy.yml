name: Deploy Terraform to AWS

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: af-south-1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Package Lambda zip
        run: |
          zip -j lambda_function.zip lambda_function.py
          ls -la

      - name: Terraform Init (reconfigure backend)
        run: terraform init -reconfigure

      - name: Show current Terraform state
        run: |
          terraform state list 2>/dev/null || echo "State not listed yet (will be created/imported in next steps)."

      - name: Import DynamoDB table if missing
        run: |
          terraform state show aws_dynamodb_table.outage_logs > /dev/null 2>&1 || terraform import aws_dynamodb_table.outage_logs OutageLogs

      - name: Import IAM role if missing
        run: |
          terraform state show aws_iam_role.lambda_role > /dev/null 2>&1 || terraform import aws_iam_role.lambda_role outage-api-lambda-role

      - name: Import Lambda function if missing
        run: |
          terraform state show aws_lambda_function.outage_api > /dev/null 2>&1 || terraform import aws_lambda_function.outage_api OutageLogAPI

      - name: Import Lambda permission if missing
        run: |
          terraform state show aws_lambda_permission.api_gateway > /dev/null 2>&1 || terraform import aws_lambda_permission.api_gateway "OutageLogAPI/AllowAPIGatewayInvoke"    

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false